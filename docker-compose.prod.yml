# EC2 + RDS: Hub 이미지만 pull 해서 API만 실행
# 사용: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
# .env 필수: DOCKERHUB_USERNAME, DB_URL(RDS 엔드포인트), MYSQL_USER, MYSQL_PASSWORD
# 예) DB_URL=jdbc:mysql://your-rds.xxx.region.rds.amazonaws.com:3306/yourdb?useSSL=true
services:
  api:
    image: ${DOCKERHUB_USERNAME}/hobby-api:${IMAGE_TAG:-latest}
    container_name: hobby-api
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
    restart: unless-stopped
